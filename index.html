<!DOCTYPE html>
<html>
<head>
  <title>Ensure MAX App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #ffffff;
      color: #333333;
      transition: background-color 0.3s, color 0.3s;
    }
    .dark {
      background: #1a1a1a;
      color: #ffffff;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
    }
    #user-info {
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 14px;
      border-left: 4px solid #007bff;
    }
    .dark #user-info {
      background: #2d2d2d;
      border-left-color: #0056b3;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #007bff;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    .status-message {
      margin-top: 10px;
      text-align: center;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ensure MAX App</h1>
    <div id="user-info">Loading user information...</div>
    <input type="text" id="data-input" placeholder="Enter data to send to bot">
    <button onclick="sendDataToBot()">Send Data to MAX Bot</button>
    <div id="status-message" class="status-message"></div>
  </div>

  <script>
    // Инициализация MAX App
    window.MaxApp.ready()
      .then(() => {
        console.log('✅ MAX App successfully initialized');

        // Получение информации о пользователе
        MaxApp.getUserInfo()
          .then(userInfo => {
            if (userInfo) {
              document.getElementById('user-info').textContent =
                `User: ${userInfo.firstName || 'Unknown'} ${userInfo.lastName || ''} (ID: ${userInfo.userId})`;
            } else {
              showStatusMessage('User info not available', 'error');
            }
          })
          .catch(error => {
            console.error('❌ Error getting user info:', error);
            document.getElementById('user-info').textContent = 'Error loading user info';
            showStatusMessage('Failed to load user info', 'error');
          });

        // Применение темы (светлая/тёмная)
        MaxApp.getTheme()
          .then(theme => {
            document.body.className = theme.isDark ? 'dark' : 'light';
          })
          .catch(error => {
            console.error('❌ Error getting theme:', error);
          });
      })
      .catch(error => {
        console.error('❌ MAX App initialization failed:', error);
        document.getElementById('user-info').textContent = 'App initialization failed';
        showStatusMessage('App initialization failed', 'error');
      });

    // Функция отправки данных в бот
    async function sendDataToBot() {
      const statusEl = document.getElementById('status-message');
      const inputEl = document.getElementById('data-input');
      const input = inputEl.value.trim();

      // Проверка на пустой ввод
      if (!input) {
        showStatusMessage('Please enter some data before sending', 'error');
        return;
      }

      try {
        // Показываем загрузку
        statusEl.textContent = 'Sending data...';
        statusEl.className = 'status-message';
        statusEl.style.display = 'block';

        await MaxApp.sendDataToBot(input);

        // Успешная отправка
        showStatusMessage('✅ Data sent successfully to MAX bot!', 'success');
        inputEl.value = ''; // Очистка поля ввода
      } catch (error) {
        console.error('❌ Failed to send data:', error);
        showStatusMessage('❌ Error sending data. Please try again.', 'error');
      }
    }

    // Вспомогательная функция для отображения статусов
    function showStatusMessage(message, type) {
      const statusEl = document.getElementById('status-message');
      statusEl.textContent = message;
      statusEl.className = `status-message ${type}`;
      statusEl.style.display = 'block';

      // Автоматическое скрытие через 5 секунд
      setTimeout(() => {
        statusEl.style.display = 'none';
      }, 5000);
    }

    // Обработка глобальных ошибок
    window.addEventListener('error', (event) => {
      console.error('JavaScript error:', event.error);
    });
  </script>
</body>
</html>
