<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniApp для Max</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Отправка сообщения</h2>
        <div class="input-group">
            <label for="message">Текст сообщения:</label>
            <input type="text" id="message" placeholder="Введите текст...">
        </div>
        <button onclick="sendMessage()">Отправить в чат</button>
    </div>

    <script>
        // Инициализация MiniApp
        document.addEventListener('DOMContentLoaded', function() {
            if (window.MaxWebApp) {
                MaxWebApp.init();
                console.log('MaxWebApp инициализирован');
            } else {
                console.error('MaxWebApp не загружен');
            }
        });

        // Функция отправки сообщения
        function sendMessage() {
            const messageInput = document.getElementById('message');
            const message = messageInput.value.trim();
            
            if (!message) {
                alert('Пожалуйста, введите текст сообщения');
                return;
            }

            if (window.MaxWebApp) {
                // Отправляем сообщение обратно в чат
                MaxWebApp.sendMessage({
                    text: message
                }).then(function(result) {
                    console.log('Сообщение отправлено:', result);
                    alert('Сообщение отправлено в чат!');
                    messageInput.value = '';
                }).catch(function(error) {
                    console.error('Ошибка при отправке сообщения:', error);
                    alert('Ошибка при отправке сообщения: ' + error.message);
                });
            } else {
                alert('MaxWebApp не доступен');
            }
        }
    </script>
</body>
</html>
