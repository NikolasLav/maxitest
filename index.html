<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
  <title>MAX Form App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Подключаем SDK MAX -->
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #ffffff;
      color: #333333;
    }
    .dark {
      background: #1a1a1a;
      color: #ffffff;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
    .status-message {
      margin-top: 15px;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MAX Form App</h1>

    <form id="data-form">
      <label for="name">Ваше имя:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Сообщение:</label>
      <textarea id="message" name="message" rows="4" required></textarea>

      <label for="category">Категория:</label>
      <select id="category" name="category">
        <option value="support">Поддержка</option>
        <option value="feedback">Обратная связь</option>
        <option value="bug">Ошибка</option>
      </select>

      <button type="submit">Отправить через вебхук</button>
    </form>

    <div id="status-message" class="status-message"></div>
  </div>

  <script>
    // Инициализация MAX App
    window.WebApp.ready()
      .then(() => {
        console.log('✅ MAX App is ready');

        // Применяем тему
        WebApp.getTheme()
          .then(theme => {
            document.body.className = theme.isDark ? 'dark' : 'light';
          })
          .catch(error => {
            console.error('❌ Error getting theme:', error);
          });
      })
      .catch(error => {
        console.error('❌ MAX initialization failed:', error);
      });

    // Обработка отправки формы
    document.getElementById('data-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      await sendDataViaWebhook();
    });

    async function sendDataViaWebhook() {
      const statusEl = document.getElementById('status-message');
      const formData = new FormData(document.getElementById('data-form'));

      // Получаем данные пользователя из MAX (если нужно)
      let userInfo = {};
      try {
        userInfo = await WebApp.getUserInfo();
      } catch (error) {
        console.warn('User info not available:', error);
      }

      // Формируем данные для отправки
      const payload = {
        userData: {
          userId: userInfo.userId || 'unknown',
          firstName: userInfo.firstName || '',
          lastName: userInfo.lastName || ''
        },
        formData: {
          name: formData.get('name'),
          email: formData.get('email'),
          message: formData.get('message'),
          category: formData.get('category')
        },
        timestamp: new Date().toISOString()
      };

      try {
        // ЗАМЕНИТЕ НА ВАШ ВЕБХУК URL
        const WEBHOOK_URL = 'https://ojie4q-81-200-8-152.ru.tuna.am/webhook';

        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        showStatusMessage('✅ Данные успешно отправлены!', 'success');
        document.getElementById('data-form').reset();
      } catch (error) {
        console.error('❌ Ошибка отправки:', error);
        showStatusMessage('❌ Ошибка отправки данных. Проверьте подключение.', 'error');
      }
    }

    function showStatusMessage(message, type) {
      statusEl.textContent = message;
      statusEl.className = `status-message ${type}`;
      statusEl.style.display = 'block';

      setTimeout(() => {
        statusEl.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
