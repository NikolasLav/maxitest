<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniApp для Max</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Отправка сообщения</h2>
        <div class="input-group">
            <label for="message">Текст сообщения:</label>
            <input type="text" id="message" placeholder="Введите текст...">
        </div>
        <button onclick="sendToBot()">Отправить в бота</button>
    </div>

    <script>
        // Отправка события в Max через Bridge
        function sendBridgeEvent(event, data = {}) {
            const message = {
                type: 'max:webapp_event',
                event,
                data
            };
            try {
                window.parent.postMessage(message, '*');
                console.log('📤 Bridge →', message);
            } catch (err) {
                console.error('❌ Ошибка postMessage:', err);
            }
        }

        // Готовность приложения
        document.addEventListener('DOMContentLoaded', () => {
            sendBridgeEvent('web_app_ready');

            // Приём ответов от Max
            window.addEventListener('message', (event) => {
                const msg = event.data;
                if (msg?.type === 'max:client_event') {
                    console.log('📥 Bridge ←', msg);
                }
            });
        });

        // Отправка данных в бот
        function sendToBot() {
            const text = document.getElementById('message').value.trim();
            if (!text) {
                alert('Введите текст!');
                return;
            }

            // Формируем данные
            const payload = {
                type: 'user_message',
                message: text,
                timestamp: new Date().toISOString()
            };

            // Выводим в консоль ПЕРЕД отправкой
            console.log('🔍 JSON для отправки:', payload);

            // Отправляем данные обратно в бота
            sendBridgeEvent('web_app_data', {
                data: JSON.stringify(payload),
                button_text: 'Открыть приложение'
            });

            // Закрываем Mini App (опционально)
            sendBridgeEvent('web_app_close');

            alert('✅ Данные отправлены в бота!');
        }
    </script>
</body>
</html>
