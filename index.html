<html>
<head>
  <title>Ensure MAX App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

    }
    .dark {
      background: #1a1a1a;
      color: #ffffff;
    }
    .container {

    }
    .dark #user-info {

    }

      font-size: 16px;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #007bff;
    }

      background: #007bff;

      border-radius: 6px;

      font-size: 16px;
      font-weight: bold;
      transition: background-color 0.3s;
    }

      background: #0056b3;
    }

      margin-top: 10px;
      text-align: center;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
