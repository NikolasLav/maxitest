<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniApp для Max</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status {
            text-align: center;
            color: red;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status" id="status">Готов к работе</div>
        <h2>Отправка сообщения</h2>
        <div class="input-group">
            <label for="message">Текст сообщения:</label>
            <input type="text" id="message" placeholder="Введите текст...">
        </div>
        <button id="sendBtn" onclick="sendToBot()">Отправить в бота</button>
    </div>

    <script>
        const statusEl = document.getElementById("status");
        const sendBtn = document.getElementById("sendBtn");
        const messageInput = document.getElementById("message");

        // Уведомляем Max, что приложение готово
        document.addEventListener('DOMContentLoaded', () => {
            try {
                window.parent.postMessage({
                    type: 'max:webapp_event',
                    event: 'web_app_ready'
                }, '*');
                console.log('✅ web_app_ready отправлено');
            } catch (err) {
                console.error('❌ Не удалось отправить web_app_ready:', err);
            }
        });

        // Отправка данных в бота
        function sendToBot() {
            const text = messageInput.value.trim();
            if (!text) {
                alert('Введите текст!');
                return;
            }

            // Формируем JSON
            const payload = {
                type: 'user_message',
                message: text,
                timestamp: new Date().toISOString()
            };

            // Выводим в консоль ПЕРЕД отправкой
            console.log('🔍 JSON для отправки:', payload);

            // Отправляем данные в бота
            try {
                window.parent.postMessage({
                    type: 'max:webapp_event',
                    event: 'web_app_data',
                    data: {
                        data: JSON.stringify(payload),
                        button_text: 'Открыть приложение'
                    }
                }, '*');

                console.log('📤 Данные отправлены в бота:', payload);

                // Закрываем Mini App (опционально)
                window.parent.postMessage({
                    type: 'max:webapp_event',
                    event: 'web_app_close'
                }, '*');

                alert('✅ Данные отправлены в бота!');
                messageInput.value = '';
            } catch (err) {
                console.error('❌ Ошибка отправки:', err);
                alert('Ошибка при отправке данных.');
            }
        }
    </script>
</body>
</html>
