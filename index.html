<!DOCTYPE html>
<html>
<head>
  <title>MAX Simple Form (Final Fix)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Правильный URL SDK -->
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #ffffff;
      color: #333333;
    }
    .dark {
      background: #1a1a1a;
      color: #ffffff;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MAX Simple Form</h1>

    <div>
      <label for="message">Введите текст:</label>
      <input type="text" id="message" placeholder="Ваш текст здесь">
    </div>

    <button onclick="sendData()">Отправить через вебхук</button>

    <div id="result"></div>
  </div>

  <script>
    // Глобальные переменные
    let isWebAppReady = false;
    const resultEl = document.getElementById('result');

    // Инициализация MAX WebApp с защитой от ошибок
    function initWebApp() {
      // Проверяем доступность WebApp
      if (!window.WebApp) {
        showMessage('⚠️ SDK MAX не загружен. Работа в режиме отладки.', 'error');
        isWebAppReady = true; // Разрешаем отправку данных без SDK
        return;
      }

      // Пытаемся вызвать ready() только если это функция
      if (typeof WebApp.ready === 'function') {
        try {
          const readyResult = WebApp.ready();
          // Проверяем, что ready() вернул промис
          if (readyResult && typeof readyResult.then === 'function') {
            readyResult
              .then(() => {
                isWebAppReady = true;
                showMessage('✅ Приложение готово к работе', 'success');
                applyTheme();
              })
              .catch(error => {
                console.warn('WebApp ready failed:', error);
                isWebAppReady = true; // Всё равно разрешаем отправку
                showMessage('⚠️ Приложение загрузилось с ограничениями', 'error');
              });
          } else {
            // Если ready() не вернул промис — считаем SDK готовым
            isWebAppReady = true;
            showMessage('⚠️ SDK MAX загружен, но ready() не возвращает промис', 'error');
            applyTheme();
          }
        } catch (error) {
          console.error('Error calling WebApp.ready():', error);
          isWebAppReady = true;
          showMessage('⚠️ Ошибка инициализации SDK', 'error');
        }
      } else {
        // Если метода ready() нет — считаем SDK готовым
        isWebAppReady = true;
        showMessage('⚠️ Метод ready() недоступен. Работа в упрощённом режиме.', 'error');
        applyTheme();
      }
    }

    // Применяем тему интерфейса
    function applyTheme() {
      if (window.WebApp && typeof WebApp.getTheme === 'function') {
        WebApp.getTheme()
          .then(theme => {
            document.body.className = theme.isDark ? 'dark' : 'light';
          })
          .catch(() => {
            // Оставляем светлую тему по умолчанию
          });
      }
    }

    async function sendData() {
      const message = document.getElementById('message').value.trim();

      // Проверяем готовность WebApp
      if (!isWebAppReady) {
        showMessage('❌ SDK MAX не готов. Попробуйте перезагрузить страницу.', 'error');
        return;
      }

      try {
        // ЗАМЕНИТЕ НА ВАШ ВЕБХУК URL
        const WEBHOOK_URL = 'https://hhzn8o-81-200-8-152.ru.tuna.am/webhook';

        // Получаем данные пользователя, если доступно
        let userInfo = {};
        if (window.WebApp && typeof WebApp.getUserInfo === 'function') {
          try {
            userInfo = await WebApp.getUserInfo();
          } catch (error) {
            console.warn('User info not available:', error);
          }
        }

        const payload = {
          message: message,
          userId: userInfo.userId || 'unknown',
          firstName: userInfo.firstName || '',
          lastName: userInfo.lastName || '',
          timestamp: new Date().toISOString()
        };

        showMessage('⏱️ Отправляем данные...', 'success');

        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload),
          signal: AbortSignal.timeout(10000)
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        showMessage(`✅ Данные успешно отправлены!\nID пользователя: ${userInfo.userId}`, 'success');
      } catch (error) {
        console.error('Ошибка отправки:', error);
        let errorMessage = '❌ Ошибка отправки данных';
        if (error.name === 'AbortError') {
          errorMessage += '\n⏰ Таймаут запроса (10 сек)';
        } else if (error.message.includes('network')) {
          errorMessage += '\n🌐 Проблемы с сетью';
        }
        showMessage(errorMessage, 'error');
      }
    }

    function showMessage(text, type) {
      if (resultEl) {
        resultEl.textContent = text;
        resultEl.className = `result ${type}`;
        resultEl.style.display = 'block';
      } else {
        alert(`Сообщение: ${text}`);
      }
    }

    // Запускаем инициализацию после загрузки страницы
    document.addEventListener('DOMContentLoaded', initWebApp);
  </script>
</body>
</html>
